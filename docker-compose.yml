services:
  aoede:
    build: .
    image: aoede-bot:latest
    container_name: spotify-bot
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./aoede-cache:/data
      - /var/run/dbus:/var/run/dbus
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
