# Discord bot token (required)
discord_token = "your_discord_bot_token"

# Discord user ID to follow (required)
discord_user_id = your_discord_user_id

# Cache directory for Spotify credentials (recommended)
cache_dir = "aoede-cache"

# Spotify credentials (optional - use cached credentials instead)
# Note: Username/password authentication was deprecated by Spotify in 2024
spotify_username = ""
spotify_password = ""

# Optional settings
spotify_bot_autoplay = true
spotify_device_name = "Aoede"
